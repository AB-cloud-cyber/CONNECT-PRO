<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectPro — Plateforme de Matching Intelligent</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/img/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/static/img/icon-192.png">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       CONNECT PRO — DESIGN SYSTEM v2
       Inspiration: LinkedIn, Wellfound, Crunchbase, Dribbble
       ═══════════════════════════════════════ */

    :root {
      --bg: #0a0e1a; --bg-2: #0f1525; --bg-3: #1a2340; --bg-4: #262f4a;
      --bg-card: rgba(15,21,37,0.8); --bg-glass: rgba(15,21,37,0.6);
      --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
      --border-active: rgba(56,189,248,0.3);
      --text: #e8edf5; --text-2: #94a3b8; --text-3: #5a6a8a;
      --accent: #38bdf8; --accent-soft: #7dd3fc; --accent-dark: #0284c7;
      --accent-muted: rgba(56,189,248,0.12); --accent-glow: rgba(56,189,248,0.06);
      --accent-glow-strong: rgba(56,189,248,0.2);
      --secondary: #818cf8; --secondary-muted: rgba(129,140,248,0.15);
      --secondary-glow: rgba(129,140,248,0.25);
      --success: #34d399; --success-muted: rgba(52,211,153,0.15);
      --error: #f87171; --warning: #fbbf24;
      --radius:12px;--radius-sm:8px;--radius-lg:20px;--radius-xl:28px;
      --shadow:0 4px 32px rgba(0,0,0,0.5);--shadow-lg:0 12px 56px rgba(0,0,0,0.6);
      --shadow-glow:0 0 40px rgba(56,189,248,0.08);
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'Inter',system-ui,-apple-system,sans-serif;
      --font-mono:'JetBrains Mono',monospace;
      --nav-h:68px;--content-w:1260px;
      --transition:0.3s cubic-bezier(0.4,0,0.2,1);
      --transition-fast:0.15s cubic-bezier(0.4,0,0.2,1);
      --transition-slow:0.5s cubic-bezier(0.4,0,0.2,1);
    }
    html.light {
      --bg: #f8fafc; --bg-2: #f1f5f9; --bg-3: #e2e8f0; --bg-4: #cbd5e1;
      --bg-card: rgba(255,255,255,0.88); --bg-glass: rgba(255,255,255,0.7);
      --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.15);
      --border-active: rgba(56,189,248,0.5);
      --text: #0f172a; --text-2: #475569; --text-3: #94a3b8;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14.5px;line-height:1.65;min-height:100vh;overflow-x:hidden}
    a{color:var(--accent);text-decoration:none;transition:color var(--transition)}
    a:hover{color:var(--accent-soft)}
    img{max-width:100%;display:block}
    input,textarea,select,button{font-family:inherit}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

    #root{display:flex;flex-direction:column;min-height:100vh}
    .main-content{flex:1;max-width:var(--content-w);width:100%;margin:0 auto;padding:2rem 2rem 3rem}

    /* ─── NAVBAR ─── */
    .navbar{position:sticky;top:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;gap:1.5rem;padding:0 2rem;background:rgba(from var(--bg) r g b / 0.8);background:var(--bg-glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .navbar::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg, rgba(56,189,248,0.02) 0%, transparent 100%)}
    .navbar-brand{display:flex;align-items:center;gap:0.5rem;color:var(--text)!important;font-size:1.15rem;font-weight:700;letter-spacing:-0.02em;position:relative;z-index:1}
    .brand-icon{color:var(--accent);font-size:1.3rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--accent-muted);border-radius:8px}
    .brand-text strong{color:var(--accent);font-weight:800}
    .brand-badge{font-size:0.55rem;font-weight:600;padding:0.15rem 0.4rem;background:var(--accent-muted);color:var(--accent);border-radius:4px;margin-left:0.2rem;letter-spacing:0.04em}
    .navbar-links{display:flex;list-style:none;gap:0.15rem;margin-left:auto;position:relative;z-index:1}
    .nav-link{color:var(--text-3)!important;padding:0.45rem 1rem;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;cursor:pointer;border:none;background:none;transition:all var(--transition-fast);position:relative}
    .nav-link:hover{color:var(--text-2)!important;background:var(--bg-3)}
    .nav-link.active{color:var(--accent)!important;background:var(--accent-glow)}
    .nav-link.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--accent);border-radius:1px}
    .nav-link-accent{background:var(--accent-muted);color:var(--accent)!important;border:1px solid var(--border-active);padding:0.4rem 1rem;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
    .nav-link-accent:hover{background:var(--accent-glow-strong);transform:translateY(-1px);box-shadow:0 4px 12px rgba(56,189,248,0.2)}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.55rem 1.3rem;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:all var(--transition);white-space:nowrap;text-decoration:none!important;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);pointer-events:none}
    .btn-primary{background:linear-gradient(135deg, var(--accent-dark), var(--accent));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(56,189,248,0.25)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(56,189,248,0.35)}
    .btn-outline{background:transparent;color:var(--accent)!important;border-color:var(--accent-muted)}
    .btn-outline:hover{background:var(--accent-glow);transform:translateY(-2px);border-color:var(--accent)}
    .btn-ghost{background:var(--bg-3);color:var(--text-2)!important;border-color:var(--border)}
    .btn-ghost:hover{background:var(--bg-4);color:var(--text)!important;transform:translateY(-1px)}
    .btn-sm{padding:0.35rem 0.85rem;font-size:0.78rem}
    .btn-lg{padding:0.75rem 1.8rem;font-size:0.95rem}
    .btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}

    /* ─── HERO ─── */
    @keyframes beam-move{0%{opacity:0;transform:translateY(0) rotate(35deg) scaleX(0.3)}15%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateY(-80vh) rotate(35deg) scaleX(1)}}
    @keyframes pulse-ring{0%{transform:scale(0.95);opacity:0.7}50%{transform:scale(1.05);opacity:0.4}100%{transform:scale(0.95);opacity:0.7}}
    @keyframes particle-float{0%,100%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:0.3}100%{transform:translateY(-120px) translateX(20px);opacity:0}}
    .hero{position:relative;display:flex;align-items:center;min-height:72vh;gap:4rem;margin:-2rem -2rem 3rem;padding:5rem 2rem 3rem;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-30%;left:20%;width:1px;height:120%;background:linear-gradient(180deg,transparent,rgba(56,189,248,0.25),transparent);transform:rotate(35deg);animation:beam-move 8s ease-in-out infinite;pointer-events:none}
    .hero::after{content:'';position:absolute;top:-30%;left:60%;width:1px;height:120%;background:linear-gradient(180deg,transparent,rgba(129,140,248,0.2),transparent);transform:rotate(35deg);animation:beam-move 12s ease-in-out 2s infinite;pointer-events:none}
    .hero-bg{position:absolute;inset:0;pointer-events:none}
    .hero-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 30%, rgba(56,189,248,0.06) 0%, transparent 70%),radial-gradient(ellipse 50% 40% at 20% 70%, rgba(129,140,248,0.04) 0%, transparent 60%),radial-gradient(ellipse 60% 40% at 80% 60%, rgba(56,189,248,0.03) 0%, transparent 50%)}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg, rgba(56,189,248,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%);-webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%)}
    .hero-content{position:relative;flex:1;max-width:560px;z-index:2}
    .hero-eyebrow{font-size:0.75rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;display:flex;align-items:center;gap:0.5rem}
    .hero-eyebrow::before{content:'';width:24px;height:1.5px;background:var(--accent);border-radius:1px}
    .hero-title{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,3.8rem);line-height:1.1;font-weight:700;color:var(--text);margin-bottom:1.5rem;letter-spacing:-0.02em}
    .hero-title em{color:var(--accent);font-style:italic;background:linear-gradient(135deg, var(--accent), var(--accent-soft));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-subtitle{color:var(--text-2);font-size:1rem;line-height:1.7;margin-bottom:2rem;max-width:460px;font-weight:400}
    .hero-actions{display:flex;gap:0.75rem;flex-wrap:wrap}
    .hero-visual{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:380px;z-index:1}
    .orb{position:absolute;border-radius:50%;pointer-events:none;will-change:transform}
    .orb-1{width:320px;height:320px;background:rgba(56,189,248,0.06);top:5%;left:10%;animation:float 8s ease-in-out infinite;filter:blur(70px)}
    .orb-2{width:240px;height:240px;background:rgba(129,140,248,0.05);bottom:5%;right:5%;animation:float 10s ease-in-out infinite reverse;filter:blur(70px)}
    .orb-pulse{width:180px;height:180px;border-radius:50%;border:1px solid rgba(56,189,248,0.15);background:transparent;animation:pulse-ring 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center}
    .orb-pulse-inner{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.15),transparent 70%);animation:pulse-ring 3s ease-in-out 0.5s infinite}
    .hero-particles{position:absolute;inset:0;pointer-events:none}
    .particle{position:absolute;width:3px;height:3px;background:var(--accent);border-radius:50%;opacity:0}
    .particle:nth-child(1){top:60%;left:10%;animation:particle-float 7s ease-in-out infinite}
    .particle:nth-child(2){top:70%;left:30%;animation:particle-float 9s ease-in-out 1s infinite}
    .particle:nth-child(3){top:50%;left:50%;animation:particle-float 8s ease-in-out 3s infinite}
    .particle:nth-child(4){top:75%;left:70%;animation:particle-float 10s ease-in-out 2s infinite}
    .particle:nth-child(5){top:40%;left:80%;animation:particle-float 6s ease-in-out 4s infinite}
    .particle:nth-child(6){top:80%;left:20%;animation:particle-float 11s ease-in-out 0.5s infinite}
    .particle:nth-child(7){top:45%;left:65%;animation:particle-float 8.5s ease-in-out 3.5s infinite}
    .orb-3{width:240px;height:240px;background:rgba(56,189,248,0.03);top:25%;left:30%;animation:float 7s ease-in-out infinite 1s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
    .network-3d{position:relative;z-index:1;width:400px;height:400px;display:flex;align-items:center;justify-content:center}
    .network-layer{position:absolute;width:100%;height:100%}
    .network-layer.back{transform:scale(0.85);opacity:0.5;filter:blur(1px)}
    .network-layer.mid{transform:scale(0.95);opacity:0.7}
    .network-layer.front{transform:scale(1)}
    .network-layer svg{width:100%;height:100%}
    .network-layer.mid{animation:rotate 60s linear infinite}
    .network-layer.back{animation:rotate 80s linear infinite reverse}
    @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .center-pulse{animation:hero-pulse 2.5s ease-in-out infinite}
    @keyframes hero-pulse{0%,100%{r:8;opacity:0.5}50%{r:14;opacity:0.1}}
    @keyframes node-glide{0%,100%{transform:translate(0,0)}25%{transform:translate(3px,-3px)}50%{transform:translate(-2px,4px)}75%{transform:translate(4px,2px)}}
    .node-pulse-0{animation:node-glide 6s ease-in-out infinite}
    .node-pulse-1{animation:node-glide 7s ease-in-out 1s infinite}
    .node-pulse-2{animation:node-glide 5s ease-in-out 2s infinite}
    .node-pulse-3{animation:node-glide 8s ease-in-out 0.5s infinite}
    @keyframes line-shimmer{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
    .line-flow-0,.line-flow-1,.line-flow-2,.line-flow-3,.line-flow-4,.line-flow-5{stroke-dasharray:8;animation:line-shimmer 3s linear infinite}
    .line-flow-0{animation-delay:0s}.line-flow-1{animation-delay:0.5s}.line-flow-2{animation-delay:1s}.line-flow-3{animation-delay:1.5s}.line-flow-4{animation-delay:2s}.line-flow-5{animation-delay:2.5s}
    @keyframes orbit-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .orbit-0{animation:orbit-rotate 8s linear infinite;transform-origin:center}
    .orbit-1{animation:orbit-rotate 10s linear infinite 1s;transform-origin:center}
    .orbit-2{animation:orbit-rotate 7s linear infinite 2s;transform-origin:center}
    .orbit-3{animation:orbit-rotate 9s linear infinite 0.5s;transform-origin:center}
    .hero-scroll{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:var(--text-3);font-size:0.7rem;display:flex;flex-direction:column;align-items:center;gap:0.3rem;letter-spacing:0.08em;text-transform:uppercase;animation:bounce 2s ease-in-out infinite;z-index:2}
    @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

    /* ─── FEATURES SECTION ─── */
    .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:4rem}
    .feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;transition:all var(--transition);text-align:center;position:relative;overflow:hidden}
    .feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent-muted),transparent);opacity:0;transition:opacity var(--transition)}
    .feature-card:hover::before{opacity:1}
    .feature-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:var(--shadow)}
    .feature-icon{width:52px;height:52px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 1rem;background:var(--accent-muted)}
    .feature-card h3{font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:0.5rem}
    .feature-card p{font-size:0.82rem;color:var(--text-2);line-height:1.6}

    /* ─── TESTIMONIALS ─── */
    .testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem;margin-bottom:4rem}
    .testimonial-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;backdrop-filter:blur(12px)}
    .testimonial-stars{color:var(--warning);font-size:0.85rem;margin-bottom:0.6rem;letter-spacing:0.15em}
    .testimonial-text{font-size:0.85rem;color:var(--text-2);line-height:1.7;font-style:italic;margin-bottom:1rem}
    .testimonial-text::before{content:'\201C';color:var(--accent);font-size:1.4rem;font-weight:700;margin-right:0.15rem}
    .testimonial-author{display:flex;align-items:center;gap:0.6rem}
    .testimonial-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;background:var(--accent-muted);color:var(--accent);flex-shrink:0}
    .testimonial-author strong{font-size:0.82rem;color:var(--text);font-weight:600}
    .testimonial-author span{font-size:0.7rem;color:var(--text-3);display:block}

    /* ─── STATS ─── */
    .stats-bar{display:flex;align-items:center;justify-content:center;gap:2.5rem;padding:2rem 2.5rem;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-xl);margin-bottom:4rem;backdrop-filter:blur(12px)}
    .stat-item{text-align:center;flex:1}
    .stat-number{display:block;font-family:var(--font-display);font-size:2.2rem;font-weight:700;background:linear-gradient(135deg, var(--accent), var(--accent-soft));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
    .stat-label{font-size:0.75rem;color:var(--text-3);margin-top:0.3rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:500}
    .stat-divider{width:1px;height:44px;background:var(--border)}

    /* ─── SECTIONS ─── */
    .section{margin-bottom:4rem}
    .section-header{text-align:center;margin-bottom:2.5rem}
    .section-eyebrow{font-size:0.72rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem}
    .section-title{font-family:var(--font-display);font-size:2rem;color:var(--text);letter-spacing:-0.01em}
    .section-subtitle{color:var(--text-2);font-size:0.9rem;margin-top:0.5rem;max-width:480px;margin-left:auto;margin-right:auto}
    .steps-grid{display:flex;align-items:flex-start;justify-content:center;gap:1rem;flex-wrap:wrap}
    .step-card{flex:1;min-width:220px;max-width:280px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;transition:all var(--transition);position:relative;overflow:hidden}
    .step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg, transparent, var(--accent-muted), transparent);opacity:0;transition:opacity var(--transition)}
    .step-card:hover::before{opacity:1}
    .step-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:var(--shadow)}
    .step-number{font-family:var(--font-display);font-size:2.4rem;font-weight:700;background:linear-gradient(135deg, var(--accent-muted), transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:0.8rem}
    .step-card h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.5rem}
    .step-card p{font-size:0.85rem;color:var(--text-2);line-height:1.6}
    .step-arrow{color:var(--accent-muted);font-size:1.4rem;margin-top:2rem;flex-shrink:0}

    /* ─── PAGE HEADER ─── */
    .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .page-title{font-family:var(--font-display);font-size:1.8rem;color:var(--text);margin-bottom:0.2rem;letter-spacing:-0.01em}
    .page-subtitle{color:var(--text-3);font-size:0.85rem;font-weight:400}
    .header-actions{display:flex;gap:0.6rem;flex-shrink:0;flex-wrap:wrap}
    .filter-row{display:flex;gap:0.6rem;margin-bottom:2rem;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;gap:0.5rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 1rem;flex:1;min-width:200px;max-width:360px;transition:border-color var(--transition)}
    .search-box:focus-within{border-color:var(--border-active)}
    .search-icon{color:var(--text-3);font-size:0.85rem}
    .search-input{background:none;border:none;outline:none;color:var(--text);padding:0.55rem 0;font-size:0.85rem;width:100%}
    .search-input::placeholder{color:var(--text-3)}

    /* ─── CARDS GRID ─── */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.25rem}

    /* ─── PROFILE CARD ─── */
    .profile-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;display:flex;flex-direction:column;gap:0.75rem;transition:all var(--transition);cursor:pointer;position:relative;overflow:hidden}
    .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg, transparent, var(--accent-muted), transparent);opacity:0;transition:opacity var(--transition)}
    .profile-card:hover::before{opacity:1}
    .profile-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .profile-card-header{display:flex;align-items:center;gap:0.9rem}
    .profile-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.95rem;flex-shrink:0;position:relative}
    .profile-avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;transition:border-color var(--transition)}
    .profile-card:hover .startup-avatar::after{border-color:var(--accent-muted)}
    .profile-card:hover .chef-avatar::after{border-color:rgba(129,140,248,0.3)}
    .startup-avatar{background:linear-gradient(135deg, var(--accent-muted), rgba(56,189,248,0.05));color:var(--accent)}
    .chef-avatar{background:linear-gradient(135deg, var(--secondary-muted), rgba(129,140,248,0.05));color:var(--secondary)}
    .profile-avatar.large{width:72px;height:72px;font-size:1.5rem;margin:0 auto 1rem}
    .profile-avatar.sm{width:34px;height:34px;font-size:0.75rem}
    .profile-meta{display:flex;flex-direction:column;gap:0.25rem;min-width:0}
    .profile-name{font-size:1rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .profile-description{font-size:0.82rem;color:var(--text-2);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
    .profile-location{font-size:0.75rem;color:var(--text-3);display:flex;align-items:center;gap:0.3rem}
    .profile-badge{display:inline-block;font-size:0.68rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-muted);letter-spacing:0.02em;white-space:nowrap}
    .profile-badge.chef{background:var(--secondary-muted);color:var(--secondary);border-color:rgba(129,140,248,0.2)}
    .profile-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:0.75rem;border-top:1px solid var(--border)}
    .profile-card     .card-actions{display:flex;gap:0.4rem;opacity:0;transform:translateY(4px);transition:all var(--transition)}
    .profile-card:hover .card-actions{opacity:1;transform:translateY(0)}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .cards-grid .profile-card,.feature-card,.testimonial-card,.step-card{animation:cardIn 0.5s cubic-bezier(0.4,0,0.2,1) both}

    /* ─── SKILLS ─── */
    .skills-list{display:flex;flex-wrap:wrap;gap:0.35rem}
    .skill-tag{font-size:0.68rem;font-weight:500;padding:0.2rem 0.6rem;border-radius:20px;background:var(--bg-3);color:var(--text-2);border:1px solid var(--border);transition:all var(--transition-fast)}
    .skill-tag:hover{background:var(--bg-4);color:var(--text)}
    .skill-tag.accent{background:var(--accent-glow);color:var(--accent);border-color:var(--accent-muted)}
    .skill-tag.accent:hover{background:var(--accent-glow-strong)}
    .skill-tag.secondary{background:var(--secondary-muted);color:var(--secondary);border-color:rgba(129,140,248,0.2)}
    .skill-tag.muted{color:var(--text-3)}

    /* ─── EMPTY STATE ─── */
    .empty-state{text-align:center;padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;gap:0.8rem}
    .empty-state svg{filter:drop-shadow(0 0 20px rgba(56,189,248,0.06))}
    .empty-state h2{font-family:var(--font-display);font-size:1.3rem;color:var(--text);margin-top:0.3rem}
    .empty-state p{color:var(--text-2);max-width:360px;font-size:0.85rem}

    /* ─── DETAIL ─── */
    .detail-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem;animation:fadeIn var(--transition-slow)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .detail-sidebar{position:sticky;top:calc(var(--nav-h) + 1.5rem);align-self:start}
    .detail-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;display:flex;flex-direction:column;gap:0.8rem}
    .detail-meta{text-align:center}
    .info-list{display:flex;flex-direction:column;gap:0.5rem}
    .info-list dt{font-size:0.68rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
    .info-list dd{font-size:0.85rem;color:var(--text-2)}
    .detail-section{margin-bottom:2rem}
    .detail-section h2{font-family:var(--font-display);font-size:1.2rem;color:var(--text);margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem}
    .body-text{color:var(--text-2);line-height:1.75;font-size:0.9rem}

    /* ─── MATCH RESULTS ─── */
    .score-legend{display:flex;gap:1.2rem;align-items:center;margin-bottom:1.2rem;font-size:0.78rem;color:var(--text-2);flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:0.35rem}
    .legend-dot{width:8px;height:8px;border-radius:50%}
    .legend-dot.high{background:var(--success);box-shadow:0 0 8px rgba(52,211,153,0.3)}
    .legend-dot.med{background:var(--warning);box-shadow:0 0 8px rgba(251,191,36,0.3)}
    .legend-dot.low{background:var(--text-3)}
    .match-results-grid{display:flex;flex-direction:column;gap:1rem}
    .match-result-card{display:grid;grid-template-columns:40px 90px 1fr;align-items:start;gap:1.25rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;border-left:3px solid transparent;transition:all var(--transition)}
    .match-result-card:hover{box-shadow:var(--shadow);border-color:var(--border-hover);transform:translateX(3px)}
    .match-result-card.high{border-left-color:var(--success)}
    .match-result-card.med{border-left-color:var(--warning)}
    .match-result-card.low{border-left-color:var(--text-3)}
    .match-rank{font-size:0.7rem;font-weight:700;color:var(--text-3);text-align:center;padding-top:0.2rem}
    .score-display{display:flex;align-items:center;justify-content:center}
    .match-body{display:flex;flex-direction:column;gap:0.5rem}
    .match-body h3{font-size:1rem;font-weight:600;color:var(--text)}
    .match-desc{font-size:0.8rem;color:var(--text-2);line-height:1.6}
    .score-breakdown{display:flex;flex-direction:column;gap:0.35rem;margin-top:0.4rem}
    .score-bar-row{display:flex;align-items:center;gap:0.6rem;font-size:0.72rem}
    .score-bar-row>span:first-child{width:85px;color:var(--text-3);flex-shrink:0}
    .score-bar{flex:1;height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden}
    .score-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.4, 0, 0.2, 1);position:relative}
    .score-bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);animation:shimmer 2s ease-in-out infinite}
    @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    .score-bar-fill.secteur{background:linear-gradient(90deg, var(--accent-dark), var(--accent))}
    .score-bar-fill.competences{background:linear-gradient(90deg, #6366f1, var(--secondary))}
    .score-bar-fill.localisation{background:linear-gradient(90deg, #059669, var(--success))}
    .score-bar-fill.description{background:linear-gradient(90deg, #d97706, var(--warning))}
    .score-val{width:32px;text-align:right;color:var(--text-2);flex-shrink:0;font-weight:600;font-size:0.78rem}
    .match-actions{grid-column:3;display:flex;gap:0.4rem;justify-content:flex-end;flex-wrap:wrap}

    /* ─── SCORE CIRCLE ─── */
    .score-circle{transform:rotate(-90deg);filter:drop-shadow(0 0 6px rgba(56,189,248,0.15))}
    .score-bg{fill:none;stroke:var(--bg-3);stroke-width:5}
    .score-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1)}
    .score-fill.score-high{stroke:var(--success);filter:drop-shadow(0 0 8px rgba(52,211,153,0.3))}
    .score-fill.score-med{stroke:var(--warning);filter:drop-shadow(0 0 8px rgba(251,191,36,0.3))}
    .score-fill.score-low{stroke:var(--text-3)}
    .score-text{fill:var(--text);font-weight:700;transform:rotate(90deg);transform-origin:center}

    /* ─── MATCHING DASHBOARD ─── */
    .matching-dashboard{display:grid;grid-template-columns:1fr auto 1fr;gap:2rem;align-items:start;animation:fadeIn var(--transition-slow)}
    .matching-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color var(--transition)}
    .matching-panel:has(.selected){border-color:var(--border-active)}
    .matching-panel-header{display:flex;align-items:center;gap:0.6rem;padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg-2)}
    .matching-panel-header h2{font-size:0.95rem;font-weight:600;color:var(--text);margin:0}
    .panel-icon{font-size:1.1rem}
    .panel-count{margin-left:auto;background:var(--bg-3);color:var(--text-2);font-size:0.75rem;font-weight:600;padding:0.15rem 0.55rem;border-radius:20px}
    .matching-list{list-style:none;max-height:420px;overflow-y:auto}
    .matching-list-item{display:flex;align-items:center;gap:0.6rem;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:all var(--transition-fast)}
    .matching-list-item:last-child{border-bottom:none}
    .matching-list-item:hover{background:var(--bg-3)}
    .matching-list-item.selected{background:var(--accent-glow);border-left:3px solid var(--accent)}
    .matching-info{flex:1;display:flex;flex-direction:column;gap:0.15rem;min-width:0}
    .matching-info strong{font-size:0.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .matching-info small{font-size:0.7rem;color:var(--text-3)}
    .panel-empty{padding:1.5rem;text-align:center;color:var(--text-2)}
    .panel-empty p{margin-bottom:0.5rem;font-size:0.85rem}
    .matching-arrow-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.4rem;padding:1.5rem 0;color:var(--text-3);font-size:0.65rem;text-align:center;line-height:1.4;text-transform:uppercase;letter-spacing:0.08em}
    .matching-center-icon{font-size:2.4rem;color:var(--accent);animation:pulse 3s ease-in-out infinite;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--accent-muted);border-radius:50%;border:1px solid var(--border-active)}
    @keyframes pulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

    .matching-results{margin-top:2rem;animation:fadeIn var(--transition-slow)}
    .matching-results h3{font-size:1.15rem;font-family:var(--font-display);color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
    .matching-results h3::before{content:'';flex:1;height:1px;background:var(--border)}

    /* ─── LOADING & BACK ─── */
    .loading{text-align:center;padding:4rem 2rem;color:var(--text-2)}
    .spinner{display:inline-block;width:28px;height:28px;border:2.5px solid var(--bg-4);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-btn{display:inline-flex;align-items:center;gap:0.35rem;color:var(--text-3);font-size:0.85rem;cursor:pointer;border:none;background:none;padding:0.35rem 0;transition:all var(--transition);margin-bottom:1.2rem}
    .back-btn:hover{color:var(--accent)}
    .page-transition{animation:fadeIn var(--transition-slow)}

    /* ─── FOOTER ─── */
    /* ─── SKELETON LOADERS ─── */
    @keyframes skeleton-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skeleton{background:linear-gradient(90deg,var(--bg-3) 25%,var(--bg-4) 50%,var(--bg-3) 75%);background-size:200% 100%;animation:skeleton-shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm)}
    .skeleton-card{background:var(--bg-card)!important;border-color:var(--border)!important}
    .skeleton-circle{width:44px;height:44px;border-radius:50%}
    .skeleton-text{height:10px;border-radius:4px;margin-top:4px}
    .w-90{width:90%}.w-80{width:80%}.w-70{width:70%}.w-60{width:60%}.w-50{width:50%}.w-40{width:40%}.w-30{width:30%}
    .skeleton-meta{display:flex;flex-direction:column}
    .skeleton-card .profile-card-footer{border-top-color:var(--border)}
    .match-skeleton{border-radius:var(--radius)}

    /* ─── FILTER PILLS ─── */
    .filter-pills-wrap{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .filter-label{font-size:0.72rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0}
    .filter-pills{display:flex;gap:0.35rem;flex-wrap:wrap}
    .filter-pill{font-size:0.78rem;padding:0.3rem 0.7rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;transition:all var(--transition-fast);font-weight:500;white-space:nowrap}
    .filter-pill:hover{background:var(--bg-3);color:var(--text);border-color:var(--border-hover)}
    .filter-pill.active{background:var(--accent-muted);color:var(--accent);border-color:var(--border-active)}

    /* ─── AVATAR STATUS ─── */
    .avatar-wrap{position:relative;display:inline-flex}
    .avatar-status{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg-2)}
    .avatar-status.online{background:#34d399}
    .avatar-status.away{background:var(--warning)}
    .avatar-status.busy{background:var(--error)}

    /* ─── NOTIFICATION BELL ─── */
    .notif-wrap{position:relative;margin-left:0.5rem}
    .notif-bell{cursor:pointer;font-size:1.15rem;border:none;background:none;color:var(--text-3);padding:6px;border-radius:var(--radius-sm);transition:all var(--transition-fast);position:relative;line-height:1;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
    .notif-bell:hover{background:var(--bg-3);color:var(--text)}
    .notif-bell.active{color:var(--accent)}
    .notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--error);border:2px solid var(--bg);animation:pulse 2s ease-in-out infinite}
    .notif-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:320px;max-height:360px;overflow-y:auto;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:300;padding:0;animation:fadeIn var(--transition)}
    .notif-header{display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1rem;border-bottom:1px solid var(--border);font-size:0.8rem;font-weight:600;color:var(--text)}
    .notif-clear{font-size:0.7rem;cursor:pointer;color:var(--text-3);border:none;background:none}
    .notif-clear:hover{color:var(--accent)}
    .notif-item{display:flex;align-items:flex-start;gap:0.6rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);transition:background var(--transition-fast);cursor:pointer}
    .notif-item:hover{background:var(--bg-3)}
    .notif-item:last-child{border-bottom:none}
    .notif-item-icon{font-size:1rem;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent-muted)}
    .notif-item-body{flex:1;min-width:0}
    .notif-item-title{font-size:0.78rem;color:var(--text);font-weight:500;margin-bottom:1px}
    .notif-item-time{font-size:0.65rem;color:var(--text-3)}
    .notif-empty{padding:1.5rem;text-align:center;color:var(--text-3);font-size:0.78rem}

    /* ─── SWIPE MATCHING ─── */
    .swipe-container{display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:1rem 0;animation:fadeIn var(--transition-slow)}
    .swipe-card-wrap{position:relative;width:340px;height:420px;touch-action:none;user-select:none}
    .swipe-card{position:absolute;width:100%;height:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;cursor:grab;transition:box-shadow 0.3s, border-color 0.3s;overflow:hidden;will-change:transform}
    .swipe-card:active{cursor:grabbing}
    .swipe-card.dragging{box-shadow:var(--shadow-lg);border-color:var(--border-hover)}
    .swipe-card .swipe-like,.swipe-card .swipe-nope{position:absolute;top:2.5rem;padding:0.5rem 1.2rem;border-radius:var(--radius-sm);font-size:1.4rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;opacity:0;pointer-events:none;z-index:5;transform:rotate(-15deg)}
    .swipe-card .swipe-like{right:1.5rem;color:var(--success);border:3px solid var(--success);background:rgba(52,211,153,0.05)}
    .swipe-card .swipe-nope{left:1.5rem;color:var(--error);border:3px solid var(--error);background:rgba(248,113,113,0.05);transform:rotate(15deg)}
    .swipe-card .swipe-like.show,.swipe-card .swipe-nope.show{opacity:1}
    .swipe-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;flex-shrink:0}
    .swipe-name{font-size:1.3rem;font-weight:700;color:var(--text);font-family:var(--font-display)}
    .swipe-sector{font-size:0.78rem;padding:0.25rem 0.75rem;border-radius:20px;background:var(--accent-muted);color:var(--accent)}
    .swipe-desc{font-size:0.82rem;color:var(--text-2);text-align:center;line-height:1.6;flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .swipe-tags{display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:center}
    .swipe-tags span{font-size:0.68rem;padding:0.2rem 0.55rem;border-radius:20px;background:var(--bg-3);color:var(--text-2)}
    .swipe-actions{display:flex;gap:1rem;align-items:center}
    .swipe-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:all var(--transition);box-shadow:var(--shadow)}
    .swipe-btn:hover{transform:scale(1.1)}
    .swipe-btn.nope{background:rgba(248,113,113,0.15);color:var(--error)}
    .swipe-btn.super{width:44px;height:44px;background:rgba(56,189,248,0.15);color:var(--accent);font-size:1.1rem}
    .swipe-btn.like{background:rgba(52,211,153,0.15);color:var(--success)}
    .swipe-counter{font-size:0.78rem;color:var(--text-3);display:flex;gap:0.35rem;align-items:center}
    .swipe-counter .count-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-muted);transition:all var(--transition)}
    .swipe-counter .count-dot.active{background:var(--accent);transform:scale(1.3)}

    /* ─── FORCE GRAPH ─── */
    .force-graph-wrap{position:relative;width:100%;height:480px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .force-graph-wrap svg{width:100%;height:100%}
    .force-graph-wrap .node circle{stroke:var(--bg-2);stroke-width:2;cursor:pointer;transition:r 0.2s}
    .force-graph-wrap .node:hover circle{filter:brightness(1.3)}
    .force-graph-wrap .node text{font-size:9px;font-family:'Inter',sans-serif;fill:var(--text-2);pointer-events:none;text-anchor:middle;dy:4}
    .force-graph-wrap .link{stroke-opacity:0.2;transition:stroke-opacity 0.2s}
    .force-graph-wrap .link:hover{stroke-opacity:0.5}
    .force-graph-legend{position:absolute;top:1rem;left:1rem;display:flex;gap:0.8rem;font-size:0.7rem;color:var(--text-3);background:var(--bg-glass);padding:0.5rem 0.8rem;border-radius:var(--radius-sm);backdrop-filter:blur(12px)}
    .force-graph-legend span{display:flex;align-items:center;gap:0.3rem}
    .force-graph-legend .lg-dot{width:8px;height:8px;border-radius:50%}
    .force-graph-legend .lg-dot.startup{background:var(--accent)}
    .force-graph-legend .lg-dot.chef{background:var(--secondary)}
    .force-graph-tip{position:absolute;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 0.9rem;font-size:0.75rem;color:var(--text);pointer-events:none;box-shadow:var(--shadow);display:none;z-index:10}
    .force-graph-tip.show{display:block}

    .footer{border-top:1px solid var(--border);padding:1.5rem 2rem;background:var(--bg);margin-top:auto}
    .footer-inner{max-width:var(--content-w);margin:0 auto;display:flex;align-items:center;gap:0.75rem;font-size:0.78rem;color:var(--text-3);justify-content:center;flex-wrap:wrap}

    /* ─── MOBILE BOTTOM NAV ─── */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:0 0 env(safe-area-inset-bottom);justify-content:space-around;align-items:center;height:64px}
    .bottom-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:6px 10px;min-width:48px;min-height:44px;border-radius:var(--radius-sm);transition:all var(--transition-fast);color:var(--text-3)}
    .bottom-nav-btn.active{color:var(--accent)}
    .bottom-nav-btn .nav-icon{font-size:1.2rem;line-height:1}
    .bottom-nav-btn .nav-label{font-size:0.6rem;font-weight:500;white-space:nowrap}
    @media(max-width:768px){
      .navbar .navbar-links{display:none}
      .navbar .theme-btn{display:none}
      .navbar .hamburger-btn{display:inline-flex!important}
      .bottom-nav{display:flex}
      .main-content{padding:1.25rem 1rem 5rem}
      .footer{padding:1rem;margin-bottom:64px}
      .hero{margin:-1.25rem -1rem 2rem;padding:2rem 1rem}
      .detail-layout{grid-template-columns:1fr}
      .detail-sidebar{position:static}
      .cards-grid{grid-template-columns:1fr}
      .match-result-card{grid-template-columns:1fr;gap:0.75rem}
      .score-display{justify-content:flex-start}
      .match-actions{justify-content:flex-start}
      .stats-bar{flex-direction:column;gap:1rem;padding:1.5rem}
      .stat-divider{width:48px;height:1px}
      .profile-card .card-actions{opacity:1;transform:none}
      .hero-scroll{display:none}
      .hero-title{font-size:1.8rem}
      .profile-card{padding:1.15rem}
      .profile-name{font-size:0.92rem}
      .back-btn{padding:0.5rem 0.4rem;font-size:0.78rem;min-height:40px}
      .search-box{min-width:0;max-width:none;flex:1}
      .filter-row{flex-direction:column}
      .filter-pills-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;flex-wrap:nowrap}
      .filter-pills{flex-wrap:nowrap}
      .filter-pill{white-space:nowrap;flex-shrink:0}
      .detail-card{padding:1.25rem}
      .stats-grid{grid-template-columns:1fr 1fr!important}
      .match-results-grid{gap:0.75rem}
      .matching-list-item{padding:0.65rem 1rem;min-height:48px}
      .matching-panel-header{padding:0.85rem 1rem}
      .section-title{font-size:1.4rem}
      .page-header{padding-bottom:1rem;margin-bottom:1.5rem}
      .page-title{font-size:1.4rem}
      .step-card{min-width:160px;max-width:none;padding:1.25rem}
    }
    @media(max-width:480px){
      .navbar{padding:0 0.75rem;gap:0.5rem}
      .brand-text{font-size:0.85rem}
      .brand-badge{display:none}
      .step-arrow{display:none}
      .hero{padding:1.5rem 0.75rem}
      .hero-title{font-size:1.5rem}
      .hero-subtitle{font-size:0.88rem}
      .hero-actions .btn{width:100%;justify-content:center}
      .hero-visual{min-height:140px}
      .hero-visual .network-3d{width:180px;height:180px;transform:scale(0.7)}
      .orb-1{width:180px;height:180px}
      .orb-2{width:140px;height:140px}
      .stats-grid{grid-template-columns:1fr 1fr!important;gap:0.6rem}
      .stat-number{font-size:1.5rem}
      .stat-label{font-size:0.65rem}
      .bottom-nav-btn .nav-label{font-size:0.55rem}
      .bottom-nav{height:56px}
      .footer-inner{font-size:0.68rem;flex-direction:column;gap:0.3rem}
      .detail-layout{gap:1rem}
      .match-result-card{padding:1rem}
      .profile-card{padding:1rem}
      .profile-description{font-size:0.78rem}
      .info-list dd{font-size:0.8rem}
      .filter-pill{font-size:0.72rem;padding:0.25rem 0.55rem}
      .empty-state{padding:2.5rem 1rem}
      .empty-icon{font-size:2rem}
    }

    /* ─── GRADIENT TEXT ─── */
    .gradient-text{background:linear-gradient(135deg,var(--accent),var(--accent-soft));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .page-title.gradient-text{font-size:1.8rem;display:inline-block}

    /* ─── SCROLL REVEAL ─── */
    .reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1),transform 0.6s cubic-bezier(0.4,0,0.2,1)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .reveal-left{opacity:0;transform:translateX(-24px);transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1),transform 0.6s cubic-bezier(0.4,0,0.2,1)}
    .reveal-left.visible{opacity:1;transform:translateX(0)}
    .reveal-right{opacity:0;transform:translateX(24px);transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1),transform 0.6s cubic-bezier(0.4,0,0.2,1)}
    .reveal-right.visible{opacity:1;transform:translateX(0)}
    .reveal-scale{opacity:0;transform:scale(0.92);transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1),transform 0.6s cubic-bezier(0.4,0,0.2,1)}
    .reveal-scale.visible{opacity:1;transform:scale(1)}

    /* ─── BACK TO TOP ─── */
    .back-to-top{position:fixed;bottom:5rem;right:1.5rem;z-index:150;width:42px;height:42px;border-radius:50%;background:var(--bg-3);border:1px solid var(--border);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;opacity:0;transform:translateY(12px);pointer-events:none;transition:all var(--transition);box-shadow:var(--shadow)}
    .back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    .back-to-top:hover{background:var(--bg-4);color:var(--text);transform:translateY(-2px)}
    @media(max-width:768px){.back-to-top{bottom:6rem;right:0.75rem;width:36px;height:36px;font-size:0.95rem}}

    /* ─── TOOLTIP ─── */
    .tooltip{position:relative;display:inline-flex}
    .tooltip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:0.3rem 0.65rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.72rem;color:var(--text-2);white-space:nowrap;opacity:0;pointer-events:none;transition:all var(--transition-fast)}
    .tooltip:hover::after{opacity:1}

    /* ─── MESH GRADIENT BG ─── */
    @keyframes mesh-shift{0%{transform:translate(0,0) scale(1)}25%{transform:translate(5%,-5%) scale(1.05)}50%{transform:translate(-3%,3%) scale(0.97)}75%{transform:translate(4%,-2%) scale(1.03)}100%{transform:translate(0,0) scale(1)}}
    .mesh-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .mesh-blob{position:absolute;border-radius:50%;filter:blur(80px);animation:mesh-shift 20s ease-in-out infinite;opacity:0.5}
    .mesh-blob:nth-child(1){width:500px;height:500px;background:rgba(56,189,248,0.08);top:-10%;left:-10%;animation-delay:0s}
    .mesh-blob:nth-child(2){width:400px;height:400px;background:rgba(129,140,248,0.06);bottom:-5%;right:-5%;animation-delay:-7s}
    .mesh-blob:nth-child(3){width:350px;height:350px;background:rgba(52,211,153,0.04);top:40%;left:50%;animation-delay:-14s}

    /* ─── FOCUS VISIBLE ─── */
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

    /* ═══════════════════════════════════════
       P- — PREMIUM ENHANCEMENTS v2026
       Glassmorphism · Micro-interactions · Animations fluides
       ═══════════════════════════════════════ */

    /* ─── P-GLASS CARD — PANEL VITRÉ ─── */
    .p-glass-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:all var(--transition-slow);position:relative}
    .p-glass-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);background:radial-gradient(ellipse at 20% 20%,rgba(56,189,248,0.04),transparent 60%);pointer-events:none;opacity:0;transition:opacity 0.6s ease}
    .p-glass-card:hover::before{opacity:1}
    .p-glass-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow),0 0 40px rgba(56,189,248,0.04)}

    /* ─── P-BORDER GLOW — BORDURE GRADIENT ANIMÉE ─── */
    .p-border-glow{position:relative;border-radius:var(--radius);background:var(--bg-card);overflow:hidden}
    .p-border-glow::before{content:'';position:absolute;inset:0;border-radius:var(--radius);padding:1px;background:linear-gradient(135deg,var(--accent-muted),transparent 40%,var(--secondary-muted) 70%,var(--accent-muted));background-size:300% 300%;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity 0.5s ease}
    .p-border-glow:hover::before{opacity:1;animation:p-borderSpin 3s ease infinite}
    @keyframes p-borderSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    /* ─── P-HERO AMBIENT — SHIMMER DE FOND ─── */
    @keyframes p-heroAmbient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .p-hero-ambient{position:relative}
    .p-hero-ambient::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(56,189,248,0.025),transparent),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(129,140,248,0.02),transparent);background-size:200% 200%;animation:p-heroAmbient 14s ease infinite;pointer-events:none;z-index:0}

    /* ─── P-CARD 3D LIFT — ÉLÉVATION AU HOVER ─── */
    .p-card-lift{transform:perspective(1000px) translateZ(0);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.4s ease;will-change:transform;backface-visibility:hidden}
    .p-card-lift:hover{transform:perspective(1000px) translateZ(14px) translateY(-8px);box-shadow:0 24px 64px rgba(0,0,0,0.45),0 0 48px rgba(56,189,248,0.05)}

    /* ─── P-LINK SOULIGNÉE — ANIMATION DE LIGNE ─── */
    .p-link-line{position:relative;color:var(--accent);cursor:pointer;display:inline-block}
    .p-link-line::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:linear-gradient(90deg,var(--accent),var(--accent-soft));transition:width 0.4s cubic-bezier(0.4,0,0.2,1);border-radius:1px}
    .p-link-line:hover::after{width:100%}
    .p-link-line.active::after{width:100%}

    /* ─── P-BTN LUMIÈRE — SHIMMER AU HOVER ─── */
    .p-btn-shimmer{overflow:hidden}
    .p-btn-shimmer::before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 20%,rgba(255,255,255,0.05) 45%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.05) 55%,transparent 80%);background-size:200% 100%;animation:p-btnShimmer 3.5s ease-in-out infinite;pointer-events:none}
    @keyframes p-btnShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ─── P-AVATAR GLOW — CERNE LUMINEUX ─── */
    .p-avatar-glow{border-radius:50%;transition:box-shadow 0.35s ease,transform 0.35s ease}
    .p-avatar-glow:hover{box-shadow:0 0 0 4px rgba(56,189,248,0.18),0 0 24px rgba(56,189,248,0.08);transform:scale(1.03)}
    .p-avatar-glow.chef:hover{box-shadow:0 0 0 4px rgba(129,140,248,0.18),0 0 24px rgba(129,140,248,0.08)}

    /* ─── P-PAGE ENTER — TRANSITION D'APPARITION ─── */
    .p-page-enter{animation:p-pageEnter 0.5s cubic-bezier(0.4,0,0.2,1)}
    @keyframes p-pageEnter{from{opacity:0;transform:translateY(16px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ─── P-NOTIF PULSE — POINT DE NOTIFICATION ANIMÉ ─── */
    .p-notif-pulse{animation:p-notifPulse 2.4s ease-in-out infinite}
    @keyframes p-notifPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.45)}}

    /* ─── P-SKELETON PREMIUM ─── */
    @keyframes p-skeletonShimmer{0%{background-position:-300% 0}100%{background-position:300% 0}}
    .p-skeleton-premium{background:linear-gradient(90deg,var(--bg-3) 20%,var(--bg-4) 40%,var(--bg-3) 60%);background-size:300% 100%;animation:p-skeletonShimmer 2.2s ease-in-out infinite;border-radius:var(--radius-sm)}
    .p-skeleton-premium-text{height:12px;border-radius:6px;margin-top:6px}
    .p-skeleton-premium-avatar{width:44px;height:44px;border-radius:50%}
    .p-skeleton-premium-card{background:var(--bg-card)!important;border-color:var(--border)!important}

    /* ─── P-FOCUS RING ─── */
    .p-focus-ring:focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm);transition:outline-offset 0.15s ease}

    /* ─── P-FLOAT — FLOTTEMENT AMBIANT ─── */
    @keyframes p-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .p-float{animation:p-float 4.5s ease-in-out infinite}
    .p-float-delayed{animation:p-float 5s ease-in-out 1.5s infinite}

    /* ─── P-SCALE IN — APPARITION PROGRESSIVE ─── */
    @keyframes p-scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    .p-scale-in{animation:p-scaleIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both}

    /* ─── P-SLIDE UP — GLISSEMENT VERS LE HAUT ─── */
    @keyframes p-slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .p-slide-up{animation:p-slideUp 0.5s cubic-bezier(0.4,0,0.2,1) both}

    /* ─── P-SPIN LENT ─── */
    @keyframes p-spinSlow{to{transform:rotate(360deg)}}
    .p-spin-slow{animation:p-spinSlow 4s linear infinite}

    /* ─── P-PULSE SOFT ─── */
    @keyframes p-pulseSoft{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:0.4;transform:scale(1.08)}}
    .p-pulse-soft{animation:p-pulseSoft 3.2s ease-in-out infinite}

    /* ─── P-SHIMMER TEXT ─── */
    @keyframes p-shimmerText{0%{background-position:-200% center}100%{background-position:200% center}}
    .p-shimmer-text{background:linear-gradient(90deg,var(--text) 30%,var(--accent-soft) 50%,var(--text) 70%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:p-shimmerText 3s linear infinite}

    /* ─── P-BREATHE — RESPIRATION ─── */
    @keyframes p-breathe{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.05);opacity:0.85}}
    .p-breathe{animation:p-breathe 4.5s ease-in-out infinite}

    /* ─── P-PROGRESS GLOW ─── */
    .p-progress-glow{position:relative;height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden}
    .p-progress-glow::before{content:'';position:absolute;top:0;left:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent-dark),var(--accent),var(--accent-soft));background-size:200% 100%;animation:p-progressGlow 2.5s ease-in-out infinite;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
    @keyframes p-progressGlow{0%,100%{background-position:0% 0}50%{background-position:100% 0}}

    /* ─── P-DIVIDER GRADIENT ─── */
    .p-divider-gradient{height:1px;background:linear-gradient(90deg,transparent,var(--accent-muted),var(--secondary-muted),transparent);border:none;margin:2rem 0}

    /* ─── P-TAG GLOW ─── */
    .p-tag-glow{display:inline-block;font-size:0.68rem;font-weight:600;padding:0.25rem 0.7rem;border-radius:20px;background:var(--accent-muted);color:var(--accent);border:1px solid transparent;transition:all 0.3s ease;box-shadow:0 0 0 rgba(56,189,248,0)}
    .p-tag-glow:hover{border-color:var(--border-active);box-shadow:0 0 20px rgba(56,189,248,0.12);transform:translateY(-1.5px)}

    /* ─── P-BADGE POP ─── */
    @keyframes p-badgePop{0%{transform:scale(0.4);opacity:0}65%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
    .p-badge-pop{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-size:0.65rem;font-weight:700;line-height:1;animation:p-badgePop 0.35s cubic-bezier(0.34,1.56,0.64,1) both}

    /* ─── P-RIPPLE ─── */
    @keyframes p-ripple{to{transform:scale(4);opacity:0}}
    .p-ripple{position:relative;overflow:hidden}
    .p-ripple::after{content:'';position:absolute;inset:0;border-radius:inherit;background:rgba(255,255,255,0.07);transform:scale(0);opacity:0;pointer-events:none}
    .p-ripple:active::after{animation:p-ripple 0.45s ease-out}

    /* ─── P-SHAKE — TREMBLEMENT ─── */
    @keyframes p-shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(7px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
    .p-shake{animation:p-shake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) both}

    /* ─── P-WIGGLE ─── */
    @keyframes p-wiggle{0%,100%{transform:rotate(0)}15%{transform:rotate(-6deg)}30%{transform:rotate(5deg)}45%{transform:rotate(-4deg)}60%{transform:rotate(3deg)}75%{transform:rotate(-1deg)}}
    .p-wiggle{animation:p-wiggle 0.65s ease-in-out}

    /* ─── P-IMAGE REVEAL ─── */
    @keyframes p-imageReveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
    .p-image-reveal{animation:p-imageReveal 0.8s cubic-bezier(0.4,0,0.2,1) both}

    /* ─── P-STAGGER FADE — FONDU DÉCALÉ ─── */
    @keyframes p-staggerFade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .p-stagger-fade{animation:p-staggerFade 0.5s cubic-bezier(0.4,0,0.2,1) both}
    .p-stagger-fade:nth-child(1){animation-delay:0s}
    .p-stagger-fade:nth-child(2){animation-delay:0.08s}
    .p-stagger-fade:nth-child(3){animation-delay:0.16s}
    .p-stagger-fade:nth-child(4){animation-delay:0.24s}
    .p-stagger-fade:nth-child(5){animation-delay:0.32s}
    .p-stagger-fade:nth-child(6){animation-delay:0.4s}
    .p-stagger-fade:nth-child(7){animation-delay:0.48s}
    .p-stagger-fade:nth-child(8){animation-delay:0.56s}

    /* ─── P-BLUR IN ─── */
    @keyframes p-blurIn{from{opacity:0;filter:blur(10px);transform:scale(0.94)}to{opacity:1;filter:blur(0);transform:scale(1)}}
    .p-blur-in{animation:p-blurIn 0.6s cubic-bezier(0.4,0,0.2,1) both}

    /* ─── P-ROTATE IN ─── */
    @keyframes p-rotateIn{from{opacity:0;transform:rotate(-15deg) scale(0.88)}to{opacity:1;transform:rotate(0) scale(1)}}
    .p-rotate-in{animation:p-rotateIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both}

    /* ─── P-STAT ANIM ─── */
    .p-stat-bar{display:flex;align-items:center;gap:0.5rem;font-size:0.78rem}
    .p-stat-bar-track{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
    .p-stat-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent-dark),var(--accent));transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(0.4,0,0.2,1)}
    .p-stat-bar-fill.visible{transform:scaleX(1)}

    /* ─── P-MOUNT ─── */
    @keyframes p-mount{from{opacity:0;transform:translateY(10px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .p-mount{animation:p-mount 0.35s cubic-bezier(0.4,0,0.2,1) both}

    /* ─── P-SCROLL THIN ─── */
    .p-scroll-thin::-webkit-scrollbar{width:3px;height:3px}
    .p-scroll-thin::-webkit-scrollbar-thumb{background:var(--text-3);border-radius:2px}
    .p-scroll-thin{scrollbar-width:thin;scrollbar-color:var(--text-3) transparent}

    /* ─── P-GLOW TEXT ─── */
    .p-glow-text{text-shadow:0 0 20px rgba(56,189,248,0.12),0 0 40px rgba(56,189,248,0.04)}

    /* ─── P-DOT GRID ─── */
    .p-dot-grid{background-image:radial-gradient(circle,var(--border) 0.5px,transparent 0.5px);background-size:16px 16px}

    /* ─── P-LINE GRID ─── */
    .p-line-grid{background-image:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:40px 40px}

    /* ─── P-INDICATOR DOT ─── */
    @keyframes p-indicator{0%,100%{opacity:1}50%{opacity:0.3}}
    .p-indicator{width:8px;height:8px;border-radius:50%;display:inline-block;animation:p-indicator 1.8s ease-in-out infinite}
    .p-indicator.online{background:var(--success);box-shadow:0 0 8px rgba(52,211,153,0.4)}
    .p-indicator.away{background:var(--warning);box-shadow:0 0 8px rgba(251,191,36,0.4)}
    .p-indicator.busy{background:var(--error);box-shadow:0 0 8px rgba(248,113,113,0.4)}

    /* ─── P-OVERLAY GRADIENT ─── */
    .p-overlay-gradient{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,14,26,0.7) 0%,transparent 50%,rgba(10,14,26,0.3) 100%);pointer-events:none}

    /* ─── P-CORNER GLOW ─── */
    .p-corner-glow{position:relative}
    .p-corner-glow::before{content:'';position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.06),transparent 70%);top:-30px;right:-30px;pointer-events:none}
    .p-corner-glow::after{content:'';position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(129,140,248,0.04),transparent 70%);bottom:-20px;left:-20px;pointer-events:none}

    /* ─── P-APPEAR FROM BELOW ─── */
    @keyframes p-appearBelow{from{opacity:0;transform:translateY(40px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .p-appear-below{animation:p-appearBelow 0.55s cubic-bezier(0.34,1.56,0.64,1) both}

    /* ─── P-CARD ACTIONS — BOUTONS D'ACTION SUR CARTE ─── */
    .p-card-actions{display:flex;gap:0.4rem;opacity:0;transform:translateY(6px);transition:all var(--transition)}
    .p-card:hover .p-card-actions,.p-card-actions.p-visible{opacity:1;transform:translateY(0)}

    /* ─── COSMIC NAV ANIMATION — FUSION STARS ─── */
    .cosmic-nav-wrap{flex:1;display:flex;align-items:center;justify-content:flex-end;height:100%;min-width:160px;max-width:280px;overflow:hidden;position:relative}
    .cosmic-nav-canvas{width:100%;height:100%;display:block;pointer-events:none}
    @media(max-width:900px){.cosmic-nav-wrap{display:none}}
  </style>
</head>
