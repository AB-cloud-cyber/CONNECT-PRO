<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectPro — Plateforme de Matching</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/img/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/static/img/icon-192.png">
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1120;
      --bg-2: #111827;
      --bg-3: #1f2937;
      --bg-4: #374151;
      --border: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.04);
      --text: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #38bdf8;
      --accent-soft: #7dd3fc;
      --accent-muted: rgba(56,189,248,0.2);
      --accent-glow: rgba(56,189,248,0.1);
      --secondary: #818cf8;
      --secondary-muted: rgba(129,140,248,0.2);
      --success: #34d399;
      --error: #f87171;
      --warning: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --nav-h: 68px;
      --content-w: 1200px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;min-height:100vh}
    a{color:var(--accent);text-decoration:none;transition:all 0.22s ease}
    a:hover{color:var(--accent-soft)}
    img{max-width:100%}
    input,textarea,select,button{font-family:inherit}

    #root{display:flex;flex-direction:column;min-height:100vh}
    .main-content{flex:1;max-width:var(--content-w);width:100%;margin:0 auto;padding:2.5rem 2rem}

    /* navbar */
    .navbar{position:sticky;top:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;gap:2rem;padding:0 2rem;background:rgba(11,17,32,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .navbar-brand{display:flex;align-items:center;gap:0.5rem;color:var(--text)!important;font-size:1.2rem;font-weight:700;letter-spacing:-0.01em}
    .brand-icon{color:var(--accent);font-size:1.4rem}
    .brand-text strong{color:var(--accent);font-weight:800}
    .navbar-links{display:flex;list-style:none;gap:0.25rem;margin-left:auto}
    .nav-link{color:var(--text-2)!important;padding:0.45rem 1rem;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:500;cursor:pointer;border:none;background:none;transition:all 0.22s ease}
    .nav-link:hover{color:var(--text)!important;background:var(--bg-3)}
    .nav-link.active{color:var(--accent)!important;background:var(--accent-glow)}
    .nav-link.active:hover{background:var(--accent-muted)}

    /* buttons */
    .btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.4rem;border-radius:var(--radius-sm);font-size:0.875rem;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:all 0.22s ease;white-space:nowrap;text-decoration:none!important}
    .btn-primary{background:var(--accent);color:#0b1120;border-color:var(--accent)}
    .btn-primary:hover{background:var(--accent-soft);transform:translateY(-1px);box-shadow:0 6px 20px rgba(56,189,248,0.35)}
    .btn-outline{background:transparent;color:var(--accent)!important;border-color:var(--accent)}
    .btn-outline:hover{background:var(--accent-glow);transform:translateY(-1px)}
    .btn-ghost{background:var(--bg-3);color:var(--text-2)!important;border-color:var(--border)}
    .btn-ghost:hover{background:var(--bg-4);color:var(--text)!important}
    .btn-sm{padding:0.4rem 0.9rem;font-size:0.8rem}
    .btn-lg{padding:0.8rem 2rem;font-size:1rem}

    /* hero */
    .hero{position:relative;display:flex;align-items:center;min-height:68vh;gap:4rem;margin:-2.5rem -2rem 4rem;padding:4rem 2rem;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(56,189,248,0.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 20% 70%,rgba(129,140,248,0.05) 0%,transparent 60%);pointer-events:none}
    .hero-content{position:relative;flex:1;max-width:560px}
    .hero-eyebrow{font-size:0.8rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem}
    .hero-title{font-family:var(--font-display);font-size:clamp(2.4rem,5vw,3.8rem);line-height:1.12;font-weight:700;color:var(--text);margin-bottom:1.5rem}
    .hero-title em{color:var(--accent);font-style:italic}
    .hero-subtitle{color:var(--text-2);font-size:1.05rem;line-height:1.7;margin-bottom:2.5rem;max-width:440px}
    .hero-actions{display:flex;gap:1rem;flex-wrap:wrap}
    .hero-visual{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:340px}
    .orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
    .orb-1{width:280px;height:280px;background:rgba(56,189,248,0.08);top:10%;left:15%}
    .orb-2{width:200px;height:200px;background:rgba(129,140,248,0.07);bottom:10%;right:10%}
    .orb-3{width:150px;height:150px;background:rgba(56,189,248,0.05);top:40%;left:45%}
    .network-lines{position:relative;z-index:1;width:340px;height:340px;opacity:0.8}
    .network-lines svg{width:100%;height:100%;animation:rotate 40s linear infinite}
    @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* stats */
    .stats-bar{display:flex;align-items:center;justify-content:center;gap:3rem;padding:2rem 3rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:5rem}
    .stat-item{text-align:center}
    .stat-number{display:block;font-family:var(--font-display);font-size:2.4rem;font-weight:700;color:var(--accent);line-height:1}
    .stat-label{font-size:0.8rem;color:var(--text-2);margin-top:0.4rem;text-transform:uppercase;letter-spacing:0.06em}
    .stat-divider{width:1px;height:48px;background:var(--border)}

    /* sections */
    .section{margin-bottom:5rem}
    .section-header{text-align:center;margin-bottom:3rem}
    .section-eyebrow{font-size:0.75rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem}
    .section-title{font-family:var(--font-display);font-size:2rem;color:var(--text)}
    .steps-grid{display:flex;align-items:flex-start;justify-content:center;gap:1rem;flex-wrap:wrap}
    .step-card{flex:1;min-width:220px;max-width:280px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:2rem}
    .step-number{font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:var(--accent-muted);line-height:1;margin-bottom:1rem}
    .step-card h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.6rem}
    .step-card p{font-size:0.875rem;color:var(--text-2)}
    .step-arrow{color:var(--accent-muted);font-size:1.5rem;margin-top:2.5rem;flex-shrink:0}

    /* page header */
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .page-title{font-family:var(--font-display);font-size:2rem;color:var(--text);margin-bottom:0.3rem}
    .page-subtitle{color:var(--text-2);font-size:0.9rem}
    .header-actions{display:flex;gap:0.75rem;flex-shrink:0;flex-wrap:wrap}

    /* cards grid */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}

    /* profile card */
    .profile-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;display:flex;flex-direction:column;gap:0.8rem;transition:all 0.22s ease;cursor:pointer}
    .profile-card:hover{border-color:var(--accent-muted);transform:translateY(-3px);box-shadow:var(--shadow)}
    .profile-card-header{display:flex;align-items:center;gap:1rem}
    .profile-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
    .startup-avatar{background:var(--accent-glow);color:var(--accent);border:1.5px solid var(--accent-muted)}
    .chef-avatar{background:var(--secondary-muted);color:var(--secondary);border:1.5px solid rgba(129,140,248,0.3)}
    .profile-avatar.large{width:72px;height:72px;font-size:1.4rem;margin:0 auto 1.2rem}
    .profile-avatar.sm{width:36px;height:36px;font-size:0.8rem}
    .profile-meta{display:flex;flex-direction:column;gap:0.3rem}
    .profile-name{font-size:1.05rem;font-weight:600;color:var(--text)}
    .profile-description{font-size:0.85rem;color:var(--text-2);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .profile-location{font-size:0.78rem;color:var(--text-3)}
    .profile-badge{display:inline-block;font-size:0.72rem;font-weight:600;padding:0.25rem 0.65rem;border-radius:20px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-muted);letter-spacing:0.02em}
    .profile-badge.chef{background:var(--secondary-muted);color:var(--secondary);border-color:rgba(129,140,248,0.3)}
    .profile-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:0.8rem;border-top:1px solid var(--border-light)}

    /* skills */
    .skills-list{display:flex;flex-wrap:wrap;gap:0.4rem}
    .skill-tag{font-size:0.72rem;font-weight:500;padding:0.25rem 0.65rem;border-radius:20px;background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
    .skill-tag.accent{background:var(--accent-glow);color:var(--accent);border-color:var(--accent-muted)}
    .skill-tag.secondary{background:var(--secondary-muted);color:var(--secondary);border-color:rgba(129,140,248,0.2)}
    .skill-tag.muted{color:var(--text-3)}

    /* empty state */
    .empty-state{text-align:center;padding:5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .empty-icon{font-size:3.5rem;opacity:0.5}
    .empty-state h2{font-family:var(--font-display);font-size:1.6rem;color:var(--text)}
    .empty-state p{color:var(--text-2);max-width:380px}

    /* detail */
    .detail-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem}
    .detail-sidebar{position:sticky;top:calc(var(--nav-h) + 1rem);align-self:start}
    .detail-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;display:flex;flex-direction:column;gap:1rem}
    .detail-meta{text-align:center}
    .info-list{display:flex;flex-direction:column;gap:0.6rem}
    .info-list dt{font-size:0.72rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
    .info-list dd{font-size:0.875rem;color:var(--text-2)}
    .detail-section{margin-bottom:2rem}
    .detail-section h2{font-family:var(--font-display);font-size:1.3rem;color:var(--text);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
    .body-text{color:var(--text-2);line-height:1.75}

    /* match results */
    .score-legend{display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem;font-size:0.8rem;color:var(--text-2);flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:0.4rem}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    .legend-dot.high{background:var(--success)}
    .legend-dot.med{background:var(--warning)}
    .legend-dot.low{background:var(--text-3)}
    .match-results-grid{display:flex;flex-direction:column;gap:1.25rem}
    .match-result-card{display:grid;grid-template-columns:32px 96px 1fr;align-items:start;gap:1.5rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;border-left:4px solid transparent;transition:all 0.22s ease}
    .match-result-card:hover{box-shadow:var(--shadow);transform:translateX(4px)}
    .match-result-card.high{border-left-color:var(--success)}
    .match-result-card.med{border-left-color:var(--warning)}
    .match-result-card.low{border-left-color:var(--text-3)}
    .match-rank{font-size:0.72rem;font-weight:700;color:var(--text-3);text-align:center;padding-top:0.3rem}
    .score-display{display:flex;align-items:center;justify-content:center}
    .match-body{display:flex;flex-direction:column;gap:0.6rem}
    .match-body h3{font-size:1.05rem;font-weight:600;color:var(--text)}
    .match-desc{font-size:0.83rem;color:var(--text-2);line-height:1.6}
    .score-breakdown{display:flex;flex-direction:column;gap:0.4rem;margin-top:0.5rem}
    .score-bar-row{display:flex;align-items:center;gap:0.75rem;font-size:0.75rem}
    .score-bar-row>span:first-child{width:90px;color:var(--text-3);flex-shrink:0}
    .score-bar{flex:1;height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden}
    .score-bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
    .score-bar-fill.secteur{background:var(--accent)}
    .score-bar-fill.competences{background:var(--secondary)}
    .score-bar-fill.localisation{background:var(--success)}
    .score-bar-fill.description{background:var(--warning)}
    .score-val{width:36px;text-align:right;color:var(--text-2);flex-shrink:0}
    .match-actions{grid-column:3;display:flex;gap:0.5rem;justify-content:flex-end;flex-wrap:wrap}

    /* matching dashboard */
    .matching-dashboard{display:grid;grid-template-columns:1fr auto 1fr;gap:2rem;align-items:start}
    .matching-panel{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .matching-panel-header{display:flex;align-items:center;gap:0.75rem;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
    .matching-panel-header h2{font-size:1rem;font-weight:600;color:var(--text);margin:0}
    .panel-icon{font-size:1.2rem}
    .panel-count{margin-left:auto;background:var(--bg-3);color:var(--text-2);font-size:0.8rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px}
    .matching-list{list-style:none}
    .matching-list-item{display:flex;align-items:center;gap:0.75rem;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border-light);cursor:pointer;transition:all 0.22s ease}
    .matching-list-item:last-child{border-bottom:none}
    .matching-list-item:hover{background:var(--bg-3)}
    .matching-list-item.selected{background:var(--accent-glow);border-left:3px solid var(--accent)}
    .matching-info{flex:1;display:flex;flex-direction:column;gap:0.2rem}
    .matching-info strong{font-size:0.875rem;color:var(--text)}
    .panel-empty{padding:2rem;text-align:center;color:var(--text-2)}
    .panel-empty p{margin-bottom:0.75rem;font-size:0.875rem}
    .matching-arrow-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;padding:2rem 0;color:var(--text-3);font-size:0.7rem;text-align:center;line-height:1.5;text-transform:uppercase;letter-spacing:0.06em}
    .matching-center-icon{font-size:2.5rem;color:var(--accent);animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

    .matching-results{margin-top:2rem}
    .matching-results h3{font-size:1.2rem;font-family:var(--font-display);color:var(--text);margin-bottom:1rem}

    /* loading & back btn */
    .loading{text-align:center;padding:4rem 2rem;color:var(--text-2)}
    .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--bg-3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-btn{margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-2);font-size:0.875rem;cursor:pointer;border:none;background:none;padding:0.4rem 0;transition:all 0.22s ease}
    .back-btn:hover{color:var(--accent)}

    /* footer */
    .footer{border-top:1px solid var(--border);padding:1.5rem 2rem;background:var(--bg);margin-top:auto}
    .footer-inner{max-width:var(--content-w);margin:0 auto;display:flex;align-items:center;gap:0.75rem;font-size:0.8rem;color:var(--text-3);justify-content:center}

    /* responsive */
    @media(max-width:900px){
      .hero{flex-direction:column;min-height:auto;padding:3rem 1.5rem}
      .hero-visual{min-height:200px}
      .detail-layout{grid-template-columns:1fr}
      .detail-sidebar{position:static}
      .matching-dashboard{grid-template-columns:1fr}
      .matching-arrow-center{transform:rotate(90deg);padding:0}
      .match-result-card{grid-template-columns:32px 80px 1fr;gap:1rem}
    }
    @media(max-width:640px){
      .navbar-links{gap:0}
      .navbar-links .nav-link{padding:0.45rem 0.6rem;font-size:0.78rem}
      .stats-bar{flex-direction:column;gap:1.5rem}
      .stat-divider{width:60px;height:1px}
      .match-result-card{grid-template-columns:1fr}
      .score-display{justify-content:flex-start}
      .match-actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/static/js/react_app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .catch(function(err) { console.warn('[PWA] SW registration failed:', err); });
  }
  </script>
</body>
</html>
